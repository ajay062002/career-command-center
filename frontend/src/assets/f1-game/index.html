<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>F1 Grand Prix 3D</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r160/three.min.js"></script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'Orbitron', sans-serif; height: 100vh; }
    canvas { display: block; position: fixed; top: 0; left: 0; z-index: 1; }
    
    /* Selection Overlay */
    #overlay {
      position: fixed; inset: 0; z-index: 20;
      background: linear-gradient(135deg, #0a1428 0%, #050a14 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center; color: white;
      text-align: center;
    }
    #overlay h1 {
      font-size: clamp(2rem, 6vw, 4rem); font-weight: 900; letter-spacing: 0.1em;
      background: linear-gradient(90deg, #e10600, #ff6b00, #e10600);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }
    #overlay .subtitle { font-size: 0.8rem; color: #666; letter-spacing: 0.3em; margin-bottom: 2rem; }
    .section-label { font-size: 0.65rem; color: #e10600; letter-spacing: 0.4em; text-transform: uppercase; margin-bottom: 1rem; }
    .cards { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-bottom: 2rem; }
    .card {
      width: 130px; padding: 14px 10px; border: 1px solid #222; border-radius: 8px; text-align: center;
      cursor: pointer; transition: all 0.2s; background: #111;
    }
    .card:hover { border-color: #e10600; background: #1a0000; transform: translateY(-4px); }
    .card.selected { border-color: #e10600; background: #200000; box-shadow: 0 0 15px rgba(225,6,0,0.4); }
    .card-color { height: 6px; border-radius: 3px; margin-bottom: 8px; }
    .card-short { font-size: 1.2rem; font-weight: 900; color: white; }
    .card-name { font-size: 0.6rem; color: #888; }
    
    #start-btn {
      padding: 14px 50px; background: #e10600; color: white; border: none; border-radius: 4px;
      font-family: 'Orbitron', sans-serif; font-size: 0.9rem; font-weight: 700; letter-spacing: 0.2em;
      cursor: pointer; transition: all 0.2s; display: none;
    }
    #start-btn:hover { background: #ff2020; box-shadow: 0 0 20px rgba(225,6,0,0.5); }
    
    /* Countdown & Lights */
    #countdown-overlay {
      position: fixed; inset: 0; z-index: 30; display: none;
      flex-direction: column; align-items: center; justify-content: center; pointer-events: none;
    }
    .lights-container { display: flex; gap: 10px; margin-bottom: 40px; }
    .light-unit { width: 40px; height: 100px; background: #111; border: 2px solid #333; border-radius: 4px; display: flex; flex-direction: column; justify-content: space-around; align-items: center; padding: 5px; }
    .bulb { width: 30px; height: 30px; background: #200; border-radius: 50%; transition: background 0.1s; }
    .light-unit.active .bulb { background: #f00; box-shadow: 0 0 20px #f00; }
    .light-unit.go .bulb { background: #0f0; box-shadow: 0 0 20px #0f0; }

    #countdown-text {
      font-size: 15vw; font-weight: 900; color: #fff;
      text-shadow: 0 0 50px rgba(255,255,255,0.4);
    }
    @keyframes countPulse {
      0% { transform: scale(2); opacity: 0; }
      20% { transform: scale(1); opacity: 1; }
      80% { transform: scale(1); opacity: 1; }
      100% { transform: scale(0.8); opacity: 0; }
    }
    
    /* HUD */
    #hud { position: fixed; inset: 0; z-index: 10; pointer-events: none; display: none; }
    .hud-panel { background: rgba(0,0,0,0.8); border: 2px solid #222; padding: 12px; border-radius: 4px; }
    #hud-tl { position: absolute; top: 20px; left: 20px; border-left: 4px solid #e10600; }
    #hud-tr { position: absolute; top: 20px; right: 20px; border-right: 4px solid #e10600; text-align: right; }
    #hud-bl { position: absolute; bottom: 20px; left: 20px; border-left: 4px solid #e10600; }
    #hud-lb { position: absolute; top: 180px; right: 20px; border-right: 4px solid #e10600; font-size: 0.7rem; min-width: 160px; }
    
    .hud-label { font-size: 0.5rem; color: #666; text-transform: uppercase; letter-spacing: 0.2em; }
    .hud-val { font-weight: 900; color: #fff; }
    .hud-gear { font-size: 3rem; color: #e10600; line-height: 1; }
    .hud-speed { font-size: 1.5rem; }
    #rpm-bg { width: 100%; height: 4px; background: #222; margin-top: 6px; }
    #rpm-bar { height: 100%; background: #0f0; width: 0%; transition: width 0.05s; }
    
    #hud-timer { font-size: 1.2rem; color: #ffd700; font-family: monospace; }
    .tire-row { display: flex; gap: 4px; margin-top: 6px; }
    .tire-box { width: 24px; height: 36px; background: #0f0; border-radius: 2px; }
    
    /* Touch Controls */
    #touch-controls { position: fixed; inset: 0; z-index: 40; pointer-events: none; display: none; }
    .t-btn {
      position: absolute; pointer-events: auto; width: 80px; height: 80px; border-radius: 50%;
      background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 900;
      backdrop-filter: blur(4px); -webkit-tap-highlight-color: transparent;
    }
    .t-btn:active { background: rgba(225,6,0,0.4); border-color: #e10600; }
    #t-left  { bottom: 40px; left: 40px; }
    #t-right { bottom: 40px; left: 140px; }
    #t-gas   { bottom: 140px; right: 40px; width: 100px; height: 100px; }
    #t-brake { bottom: 30px; right: 40px; width: 100px; height: 100px; }
    #t-drs   { bottom: 150px; right: 160px; width: 60px; height: 60px; font-size: 0.7rem; }
    #t-pit   { top: 120px; left: 20px; width: 60px; height: 60px; font-size: 0.7rem; border-color: #ffd700; }

    @media (max-width: 1024px), (pointer: coarse) { #touch-controls { display: block; } }
    
    /* Messages */
    #lap-msg {
      position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%);
      font-size: 4rem; font-weight: 900; color: rgba(255,255,255,0.3); pointer-events: none; opacity: 0;
      text-shadow: 0 0 20px rgba(0,255,0,0.2);
    }
    #overtake-msg {
      position: fixed; top: 20%; left: 50%; transform: translateX(-50%);
      color: #0f0; font-weight: 900; font-size: 2rem; opacity: 0; transition: opacity 0.3s;
    }
  </style>
</head>
<body>

  <!-- Selection Overlay -->
  <div id="overlay">
    <h1>F1 RACING</h1>
    <p class="subtitle">GRAND PRIX PRO SIMULATOR</p>
    
    <p class="section-label">Select Your Team</p>
    <div id="team-cards" class="cards"></div>
    
    <p class="section-label" id="circuit-label" style="display:none">Select Circuit</p>
    <div id="circuit-cards" class="cards" style="display:none"></div>
    
    <button id="start-btn">START RACE</button>
  </div>

  <!-- Countdown Overlay -->
  <div id="countdown-overlay">
    <div class="lights-container">
      <div class="light-unit" id="l1"><div class="bulb"></div><div class="bulb"></div></div>
      <div class="light-unit" id="l2"><div class="bulb"></div><div class="bulb"></div></div>
      <div class="light-unit" id="l3"><div class="bulb"></div><div class="bulb"></div></div>
      <div class="light-unit" id="l4"><div class="bulb"></div><div class="bulb"></div></div>
      <div class="light-unit" id="l5"><div class="bulb"></div><div class="bulb"></div></div>
    </div>
    <div id="countdown-text"></div>
  </div>

  <!-- HUD Overlay -->
  <div id="hud">
    <div id="overtake-msg">OVERTAKE!</div>
    <div id="hud-tl" class="hud-panel">
      <div style="display:flex; align-items:center; gap:12px">
        <div class="hud-gear" id="gear">1</div>
        <div>
          <div class="hud-label">Speed</div>
          <div class="hud-val hud-speed" id="speed">0</div>
        </div>
      </div>
      <div id="rpm-bg"><div id="rpm-bar"></div></div>
      <div id="drs-msg" style="font-size:0.55rem; margin-top:4px; color:#555">DRS LOCKED</div>
    </div>

    <div id="hud-tr" class="hud-panel">
      <div class="hud-label">Lap <span id="lap">1/5</span></div>
      <div id="hud-timer">00:00.000</div>
      <div class="hud-label">Best: <span id="best">--:--.---</span></div>
      <div class="hud-label" style="font-size:0.55rem; margin-top:4px" id="pos">POS: 1st</div>
      <div id="sec-times" style="font-size:0.5rem; color:#888; margin-top:4px">
        S1: <span id="s1">--</span> S2: <span id="s2">--</span> S3: <span id="s3">--</span>
      </div>
    </div>

    <div id="hud-bl" class="hud-panel">
      <div class="hud-label">Tires & Status</div>
      <div class="tire-row">
        <div id="t0" class="tire-box"></div><div id="t1" class="tire-box"></div>
        <div id="t2" class="tire-box"></div><div id="t3" class="tire-box"></div>
      </div>
      <div class="hud-label" style="margin-top:8px">Damage: <span id="dmg" style="color:#fff">0%</span></div>
    </div>

    <div id="hud-lb" class="hud-panel">
      <div class="hud-label">Leaderboard</div>
      <div id="lb-rows"></div>
    </div>
  </div>

  <!-- Message Box -->
  <div id="lap-msg">LAP 2</div>

  <!-- Touch Controls -->
  <div id="touch-controls">
    <div id="t-left" class="t-btn">L</div>
    <div id="t-right" class="t-btn">R</div>
    <div id="t-gas" class="t-btn">GO</div>
    <div id="t-brake" class="t-btn">STOP</div>
    <div id="t-drs" class="t-btn">DRS</div>
    <div id="t-pit" class="t-btn">PIT</div>
  </div>

  <script src="main.js"></script>
</body>
</html>
