<h2 mat-dialog-title>{{ isEdit ? 'Edit RTR' : 'Add RTR' }}</h2>
<mat-dialog-content>
    <form [formGroup]="rtrForm" class="rtr-form">
        <div class="form-row">
            <mat-form-field appearance="outline">
                <mat-label>Date</mat-label>
                <input matInput [matDatepicker]="picker" formControlName="date" required>
                <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
                <mat-datepicker #picker></mat-datepicker>
            </mat-form-field>

            <mat-form-field appearance="outline">
                <mat-label>Status</mat-label>
                <mat-select formControlName="status" required>
                    @for (s of statuses; track s) {
                    <mat-option [value]="s">{{ s }}</mat-option>
                    }
                </mat-select>
            </mat-form-field>
        </div>

        <div class="form-row">
            <mat-form-field appearance="outline">
                <mat-label>Role</mat-label>
                <input matInput formControlName="role" required placeholder="e.g. Java Developer">
            </mat-form-field>

            <mat-form-field appearance="outline">
                <mat-label>Location</mat-label>
                <input matInput formControlName="location" placeholder="e.g. New York, NY">
            </mat-form-field>
        </div>

        <div class="form-row">
            <mat-form-field appearance="outline">
                <mat-label>Vendor Name</mat-label>
                <input matInput formControlName="vendorName" placeholder="Recruiter Name">
            </mat-form-field>

            <mat-form-field appearance="outline">
                <mat-label>Vendor Company</mat-label>
                <input matInput formControlName="vendorCompany" required placeholder="e.g. Apex Systems">
            </mat-form-field>
        </div>

        <div class="form-row">
            <mat-form-field appearance="outline">
                <mat-label>Client Name</mat-label>
                <input matInput formControlName="clientName" placeholder="End Client">
            </mat-form-field>

            <mat-form-field appearance="outline">
                <mat-label>Vendor Contact</mat-label>
                <input matInput formControlName="vendorContact" placeholder="Email or Phone">
            </mat-form-field>
        </div>

        <mat-form-field appearance="outline">
            <mat-label>Rate</mat-label>
            <input matInput type="number" formControlName="rate" placeholder="e.g. 75">
            <span matPrefix>$&nbsp;</span>
            <span matSuffix>/hr</span>
        </mat-form-field>
    </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
    <button mat-button (click)="onCancel()">Cancel</button>
    <button mat-raised-button color="primary" [disabled]="rtrForm.invalid" (click)="onSave()">
        {{ isEdit ? 'Update' : 'Save' }}
    </button>
</mat-dialog-actions>
