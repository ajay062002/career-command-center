<div class="admin-container">
    <div class="page-header">
        <h1>Account Administration</h1>
        <div class="admin-stats">
            <div class="stat-bubble">
                <span class="bubble-val">{{ users.length }}</span>
                <span class="bubble-lbl">Total Users</span>
            </div>
            <div class="stat-bubble">
                <span class="bubble-val">{{ getAdminCount() }}</span>
                <span class="bubble-lbl">Admins</span>
            </div>
        </div>
    </div>



    <div class="glass-card table-container">
        <table mat-table [dataSource]="users" class="admin-table">
            <!-- ID Column -->
            <ng-container matColumnDef="id">
                <th mat-header-cell *matHeaderCellDef> ID </th>
                <td mat-cell *matCellDef="let user"> {{user.id | slice:0:8}}... </td>
            </ng-container>

            <!-- Username Column -->
            <ng-container matColumnDef="username">
                <th mat-header-cell *matHeaderCellDef> Username </th>
                <td mat-cell *matCellDef="let user"> {{user.username}} </td>
            </ng-container>

            <!-- Email Column -->
            <ng-container matColumnDef="email">
                <th mat-header-cell *matHeaderCellDef> Email </th>
                <td mat-cell *matCellDef="let user"> {{user.email}} </td>
            </ng-container>

            <!-- Role Column -->
            <ng-container matColumnDef="role">
                <th mat-header-cell *matHeaderCellDef> Role </th>
                <td mat-cell *matCellDef="let user">
                    <span class="role-badge" [class.admin]="user.role === 'ROLE_ADMIN'">{{user.role}}</span>
                </td>
            </ng-container>

            <!-- Actions Column -->
            <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef> Actions </th>
                <td mat-cell *matCellDef="let user">
                    <button mat-icon-button color="accent" (click)="viewReport(user.id)" title="View Report">
                        <mat-icon>bar_chart</mat-icon>
                    </button>
                    <button mat-icon-button color="primary" (click)="promoteUser(user)" title="Toggle Admin">
                        <mat-icon>security</mat-icon>
                    </button>
                    <button mat-icon-button color="warn" (click)="deleteUser(user.id)" title="Delete User">
                        <mat-icon>delete</mat-icon>
                    </button>
                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
    </div>
</div>
