# PostgreSQL Profile Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/careerdb
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=careeruser
spring.datasource.password=careerpass

# JPA settings
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Disable H2 console for postgres
spring.h2.console.enabled=false

# HikariCP connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=CareerHikariPool

# Virtual threads (Spring Boot 3.4+)
spring.threads.virtual.enabled=true
