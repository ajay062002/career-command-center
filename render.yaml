services:
  - type: web
    name: career-command-center-api
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn django_backend.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: api.ajaylive.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://ajaylive.com,https://www.ajaylive.com
      - key: DATABASE_URL
        fromDatabase:
          name: career-command-center-db
          property: connectionString
    healthCheckPath: /api/health/

databases:
  - name: career-command-center-db
    databaseName: careerdb
    plan: free
