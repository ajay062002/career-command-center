services:
  - type: web
    name: career-command-center-api
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate && python manage.py seed
    startCommand: gunicorn django_backend.wsgi:application --bind 0.0.0.0:$PORT --workers 3 --threads 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: api.ajaylive.com,career-command-center-api.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://ajaylive.com,https://www.ajaylive.com
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: career-command-center-db
          property: connectionString
    healthCheckPath: /api/health/

databases:
  - name: career-command-center-db
    databaseName: careerdb
    plan: free
