<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Racing Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a1a;
            font-family: Arial, sans-serif;
        }
        #gameContainer {
            position: relative;
            background: #000;
            border: 3px solid #ff0000;
        }
        canvas {
            display: block;
            background: #87ceeb;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-size: 12px;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 5px;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="1200" height="700"></canvas>
        <div id="info">
            <p>W/↑: Throttle | S/↓: Brake | A/←: Left | D/→: Right</p>
            <p>P: Pit Stop | SPACE: DRS (Straights)</p>
            <p id="gameStatus">Starting...</p>
        </div>
    </div>

    <script>
        // ============================================================================
        // PLAN: F1 RACING GAME - COMPLETE EXECUTION
        // ============================================================================
        // SECTION 1: HTML BOILERPLATE ✓
        // SECTION 2: GAME CONSTANTS
        // SECTION 3: GAME STATE OBJECT
        // SECTION 4: UTILITY FUNCTIONS
        // SECTION 5: INPUT HANDLER
        // SECTION 6: PHYSICS ENGINE
        // SECTION 7: AI LOGIC
        // SECTION 8: LAP & POSITION TRACKING
        // SECTION 9: RENDERING ENGINE
        // SECTION 10: GAME LOOP
        // SECTION 11: INITIALIZATION
        // ============================================================================

        // SECTION 2: GAME CONSTANTS
        const CANVAS = { width: 1200, height: 700 };
        const TRACK = {
            width: 120,
            startX: 250,
            startY: 150,
            waypoints: [
                {x: 250, y: 150}, {x: 350, y: 100}, {x: 500, y: 90}, {x: 650, y: 100},
                {x: 800, y: 150}, {x: 900, y: 250}, {x: 950, y: 400}, {x: 900, y: 550},
                {x: 800, y: 600}, {x: 650, y: 620}, {x: 500, y: 610}, {x: 350, y: 600},
                {x: 200, y: 550}, {x: 100, y: 400}, {x: 50, y: 250}, {x: 100, y: 150},
                {x: 150, y: 120}, {x: 200, y: 110}, {x: 250, y: 130}, {x: 250, y: 150}
            ]
        };
        const PLAYER_CAR = {
            maxSpeed: 400,
            acceleration: 8,
            braking: 12,
            friction: 0.95,
            steeringAngle: 0.08,
            mass: 1,
            tireWearRate: 0.0001,
            drsSpeedBoost: 1.25
        };
        const AI_CAR = {
            maxSpeed: 350,
            acceleration: 6.5,
            braking: 10,
            count: 5
        };
        const RACE = {
            totalLaps: 3,
            pitStopDuration: 3000,
            drsAvailableAfterLap: 2,
            startCountdown: 5
        };

        // SECTION 3: GAME STATE OBJECT
        let gameState = {
            player: null,
            aiCars: [],
            raceStarted: false,
            raceStartCountdown: RACE.startCountdown,
            currentTime: 0,
            leaderboard: [],
            gamePhase: "start", // "start" | "racing" | "results"
            finishedCars: [],
            waypointIndex: {}
        };

        // SECTION 4: UTILITY FUNCTIONS
        function distanceBetween(x1, y1, x2, y2) {
            const dx = x2 - x1;
            const dy = y2 - y1;
            return Math.sqrt(dx * dx + dy * dy);
        }

        function angleToPoint(fromX, fromY, toX, toY) {
            return Math.atan2(toY - fromY, toX - fromX);
        }

        function clamp(value, min, max) {
            return Math.max(min, Math.min(max, value));
        }

        function getTireGrip(tireWear, onGrass = false) {
            let grip = tireWear;
            if (onGrass) grip *= 0.6;
            return clamp(grip, 0.3, 1.0);
        }

        function checkPointCollision(carX, carY, pointX, pointY, radius) {
            return distanceBetween(carX, carY, pointX, pointY) < radius;
        }

        function checkWallCollision(carX, carY, trackWaypoints) {
            for (let i = 0; i < trackWaypoints.length - 1; i++) {
                const x1 = trackWaypoints[i].x;
                const y1 = trackWaypoints[i].y;
                const x2 = trackWaypoints[i + 1].x;
                const y2 = trackWaypoints[i + 1].y;

                const dist = pointToLineDistance(carX, carY, x1, y1, x2, y2);
                if (dist < TRACK.width / 2) return true;
            }
            return false;
        }

        function pointToLineDistance(px, py, x1, y1, x2, y2) {
            const num = Math.abs((y2 - y1) * px - (x2 - x1) * py + x2 * y1 - y2 * x1);
            const den = distanceBetween(x1, y1, x2, y2);
            return num / den;
        }

        function checkFinishLine(carX, carY, lastX, lastY) {
            const finishLine = {x1: TRACK.waypoints[0].x - 20, y1: TRACK.waypoints[0].y - 30,
                              x2: TRACK.waypoints[0].x - 20, y2: TRACK.waypoints[0].y + 30};
            const crossed = (lastX < finishLine.x1 && carX >= finishLine.x1) ||
                           (lastX > finishLine.x1 && carX <= finishLine.x1);
            return crossed && carY > finishLine.y1 - 50 && carY < finishLine.y2 + 50;
        }

        // SECTION 5: INPUT HANDLER
        const keys = {};
        window.addEventListener('keydown', (e) => { keys[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });

        function getPlayerInput() {
            return {
                throttle: keys['w'] || keys['arrowup'],
                brake: keys['s'] || keys['arrowdown'],
                left: keys['a'] || keys['arrowleft'],
                right: keys['d'] || keys['arrowright'],
                pitStop: keys['p'],
                drs: keys[' ']
            };
        }

        // SECTION 6: PHYSICS ENGINE
        function updateCarPhysics(car, input, dt, trackWaypoints, isPlayer = false) {
            if (car.isPitting) return;

            const maxSpeed = isPlayer ? PLAYER_CAR.maxSpeed : AI_CAR.maxSpeed;
            const accel = isPlayer ? PLAYER_CAR.acceleration : AI_CAR.acceleration;
            const braking = isPlayer ? PLAYER_CAR.braking : AI_CAR.braking;
            const steeringSpeed = PLAYER_CAR.steeringAngle;

            // Steering
            if (input.left) car.steeringAngle = clamp(car.steeringAngle - steeringSpeed * dt, -0.5, 0);
            if (input.right) car.steeringAngle = clamp(car.steeringAngle + steeringSpeed * dt, 0, 0.5);
            car.steeringAngle *= 0.92; // Return to center

            // Acceleration & Braking
            if (input.throttle && car.speed < maxSpeed) {
                car.speed += accel * dt * (isPlayer ? 1 : 0.9);
            }
            if (input.brake) {
                car.speed -= braking * dt;
            }

            // DRS Boost (player only)
            if (isPlayer && input.drs && car.lap >= RACE.drsAvailableAfterLap && car.drsActive === false) {
                car.drsActive = true;
                car.drsTimer = 5;
            }
            if (car.drsActive) {
                car.drsTimer -= dt;
                car.speed = Math.min(car.speed * PLAYER_CAR.drsSpeedBoost, maxSpeed * 1.3);
                if (car.drsTimer <= 0) car.drsActive = false;
            }

            // Friction
            car.speed *= PLAYER_CAR.friction;
            car.speed = clamp(car.speed, 0, maxSpeed);

            // Tire grip effect
            const grip = getTireGrip(car.tireWear, false);
            const effectiveSpeed = car.speed * grip;

            // Update position
            car.lastX = car.x;
            car.lastY = car.y;
            car.angle += car.steeringAngle * dt;
            car.x += Math.cos(car.angle) * effectiveSpeed * dt;
            car.y += Math.sin(car.angle) * effectiveSpeed * dt;

            // Wall collision
            if (checkWallCollision(car.x, car.y, trackWaypoints)) {
                car.x = car.lastX;
                car.y = car.lastY;
                car.speed *= 0.5;
            }

            // Boundary collision
            if (car.x < 0 || car.x > CANVAS.width || car.y < 0 || car.y > CANVAS.height) {
                car.x = clamp(car.x, 0, CANVAS.width);
                car.y = clamp(car.y, 0, CANVAS.height);
                car.speed *= 0.3;
            }
        }

        function updateTireWear(car, dt) {
            if (!car.isPitting) {
                car.tireWear = Math.max(0, car.tireWear - PLAYER_CAR.tireWearRate * dt * car.speed);
            }
        }

        function updatePitStop(car, dt) {
            if (car.isPitting) {
                car.pitTimeRemaining -= dt * 1000;
                if (car.pitTimeRemaining <= 0) {
                    car.isPitting = false;
                    car.tireWear = 1.0;
                }
            }
        }

        // SECTION 7: AI LOGIC
        function updateAICar(aiCar, playerCar, allCars, trackWaypoints, dt) {
            const input = {
                throttle: true,
                brake: false,
                left: false,
                right: false,
                pitStop: false,
                drs: false
            };

            // Find closest waypoint
            if (!gameState.waypointIndex[aiCar.id]) gameState.waypointIndex[aiCar.id] = 0;
            const currentWP = gameState.waypointIndex[aiCar.id];
            const nextWP = trackWaypoints[(currentWP + 1) % trackWaypoints.length];
            const distToWP = distanceBetween(aiCar.x, aiCar.y, nextWP.x, nextWP.y);

            if (distToWP < 80) {
                gameState.waypointIndex[aiCar.id] = (currentWP + 1) % trackWaypoints.length;
            }

            // Steer toward waypoint
            const targetAngle = angleToPoint(aiCar.x, aiCar.y, nextWP.x, nextWP.y);
            const angleDiff = targetAngle - aiCar.angle;
            if (Math.abs(angleDiff) > 0.1) {
                if (angleDiff > 0) input.right = true;
                else input.left = true;
            }

            // Speed control
            if (aiCar.speed < 300) input.throttle = true;
            if (distToWP < 150 && aiCar.speed > 250) input.brake = true;

            // Rubber band
            if (aiCar.speed < 280) aiCar.speed += 2;

            // Pit stop logic (when tire wear is low)
            if (aiCar.tireWear < 0.3 && !aiCar.isPitting) {
                aiCar.isPitting = true;
                aiCar.pitTimeRemaining = RACE.pitStopDuration;
            }

            updateCarPhysics(aiCar, input, dt, trackWaypoints, false);
        }

        // SECTION 8: LAP & POSITION TRACKING
        function updateLapCounter(car, trackWaypoints) {
            if (checkFinishLine(car.x, car.y, car.lastX, car.lastY)) {
                car.lap += 1;
                car.lastLapTime = Date.now();
            }
        }

        function updateLeaderboard(gameState) {
            const cars = [gameState.player, ...gameState.aiCars];
            const sorted = cars.sort((a, b) => {
                if (a.lap !== b.lap) return b.lap - a.lap;
                const distA = distanceBetween(a.x, a.y, TRACK.waypoints[0].x, TRACK.waypoints[0].y);
                const distB = distanceBetween(b.x, b.y, TRACK.waypoints[0].x, TRACK.waypoints[0].y);
                return distA - distB;
            });
            return sorted.map((car, i) => ({...car, position: i + 1}));
        }

        // SECTION 9: RENDERING ENGINE
        function drawTrack(ctx, trackWaypoints) {
            // Sky
            ctx.fillStyle = '#87ceeb';
            ctx.fillRect(0, 0, CANVAS.width, CANVAS.height);

            // Grass
            ctx.fillStyle = '#2d5016';
            ctx.fillRect(0, 0, CANVAS.width, CANVAS.height);

            // Track
            ctx.strokeStyle = '#333';
            ctx.lineWidth = TRACK.width;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.beginPath();
            ctx.moveTo(trackWaypoints[0].x, trackWaypoints[0].y);
            for (let i = 1; i < trackWaypoints.length; i++) {
                ctx.lineTo(trackWaypoints[i].x, trackWaypoints[i].y);
            }
            ctx.stroke();

            // Curbs
            ctx.strokeStyle = '#ff0000';
            ctx.lineWidth = 8;
            ctx.stroke();

            // Finish line
            ctx.fillStyle = 'white';
            for (let i = 0; i < 20; i++) {
                if (i % 2 === 0) {
                    ctx.fillRect(TRACK.waypoints[0].x - 25, TRACK.waypoints[0].y - 30 + i * 3, 50, 3);
                }
            }

            // Pit lane
            ctx.fillStyle = 'rgba(255, 200, 0, 0.3)';
            ctx.fillRect(TRACK.waypoints[6].x - 100, TRACK.waypoints[6].y - 40, 150, 80);
        }

        function drawCar(ctx, car, color, isPlayer = false) {
            ctx.save();
            ctx.translate(car.x, car.y);
            ctx.rotate(car.angle);

            // Car body
            ctx.fillStyle = color;
            ctx.fillRect(-15, -8, 30, 16);

            // Car outline
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            ctx.strokeRect(-15, -8, 30, 16);

            // Driver head
            ctx.fillStyle = '#ffcc99';
            ctx.beginPath();
            ctx.arc(0, -4, 3, 0, Math.PI * 2);
            ctx.fill();

            // Tire wear indicator bar
            ctx.fillStyle = car.tireWear > 0.6 ? '#00ff00' : car.tireWear > 0.3 ? '#ffff00' : '#ff0000';
            ctx.fillRect(-15, -15, 30 * car.tireWear, 3);

            ctx.restore();
        }

        function drawHUD(ctx, gameState, player) {
            ctx.fillStyle = 'white';
            ctx.font = 'bold 24px Arial';

            // Speed
            ctx.fillText(`Speed: ${Math.round(player.speed)} km/h`, 20, 50);

            // Lap
            ctx.fillText(`Lap: ${player.lap}/${RACE.totalLaps}`, 20, 80);

            // Position
            const position = gameState.leaderboard.find(c => c.id === player.id)?.position || 1;
            ctx.fillText(`Position: ${position}/${gameState.aiCars.length + 1}`, 20, 110);

            // Tire wear
            ctx.font = '16px Arial';
            ctx.fillText(`Tire Wear: ${Math.round(player.tireWear * 100)}%`, 20, 140);

            // DRS Status
            if (player.lap >= RACE.drsAvailableAfterLap) {
                ctx.fillStyle = player.drsActive ? '#00ff00' : '#ffff00';
                ctx.fillText(`DRS: ${player.drsActive ? 'ACTIVE' : 'AVAILABLE'}`, 20, 170);
            }

            // Mini map
            const mapX = CANVAS.width - 180;
            const mapY = CANVAS.height - 180;
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillRect(mapX, mapY, 160, 160);

            ctx.strokeStyle = '#00ff00';
            ctx.lineWidth = 1;
            ctx.beginPath();
            for (let i = 0; i < gameState.leaderboard.length; i++) {
                const car = gameState.leaderboard[i];
                const sx = mapX + (car.x / CANVAS.width) * 160;
                const sy = mapY + (car.y / CANVAS.height) * 160;
                ctx.fillStyle = car.id === player.id ? '#ffff00' : '#00ff00';
                ctx.fillRect(sx - 2, sy - 2, 4, 4);
                ctx.fillText(i + 1, sx + 5, sy);
            }
        }

        function drawStartCountdown(ctx, countdown) {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, CANVAS.width, CANVAS.height);

            ctx.fillStyle = '#ff0000';
            ctx.font = 'bold 200px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            if (countdown > 0) {
                ctx.fillText(Math.ceil(countdown), CANVAS.width / 2, CANVAS.height / 2);
            } else {
                ctx.fillStyle = '#00ff00';
                ctx.font = 'bold 150px Arial';
                ctx.fillText('GO!', CANVAS.width / 2, CANVAS.height / 2);
            }
        }

        function drawRaceResults(ctx, leaderboard) {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.9)';
            ctx.fillRect(0, 0, CANVAS.width, CANVAS.height);

            ctx.fillStyle = '#ffff00';
            ctx.font = 'bold 60px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('RACE FINISHED', CANVAS.width / 2, 100);

            ctx.fillStyle = 'white';
            ctx.font = '24px Arial';
            ctx.textAlign = 'left';
            for (let i = 0; i < Math.min(leaderboard.length, 6); i++) {
                const car = leaderboard[i];
                ctx.fillText(`${i + 1}. Car ${car.id} - Laps: ${car.lap}`, 200, 200 + i * 50);
            }

            ctx.fillStyle = '#00ff00';
            ctx.font = 'bold 24px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('Press R to Restart', CANVAS.width / 2, CANVAS.height - 50);
        }

        // SECTION 10: GAME LOOP
        let lastTime = Date.now();
        function gameLoop() {
            const now = Date.now();
            const dt = (now - lastTime) / 1000;
            lastTime = now;

            const ctx = canvas.getContext('2d');

            if (gameState.gamePhase === "start") {
                gameState.raceStartCountdown -= dt;
                drawTrack(ctx, TRACK.waypoints);
                drawStartCountdown(ctx, gameState.raceStartCountdown);

                if (gameState.raceStartCountdown <= 0) {
                    gameState.gamePhase = "racing";
                }
            } else if (gameState.gamePhase === "racing") {
                const input = getPlayerInput();

                // Update player
                updateCarPhysics(gameState.player, input, dt, TRACK.waypoints, true);
                updateTireWear(gameState.player, dt);
                updatePitStop(gameState.player, dt);
                updateLapCounter(gameState.player, TRACK.waypoints);

                // Update AI cars
                gameState.aiCars.forEach(aiCar => {
                    updateAICar(aiCar, gameState.player, gameState.aiCars, TRACK.waypoints, dt);
                    updateTireWear(aiCar, dt);
                    updatePitStop(aiCar, dt);
                    updateLapCounter(aiCar, TRACK.waypoints);
                });

                // Check if anyone finished
                const finished = [gameState.player, ...gameState.aiCars].filter(c => c.lap >= RACE.totalLaps);
                if (finished.length === gameState.aiCars.length + 1) {
                    gameState.gamePhase = "results";
                }

                // Update leaderboard
                gameState.leaderboard = updateLeaderboard(gameState);

                // Draw
                drawTrack(ctx, TRACK.waypoints);
                drawCar(ctx, gameState.player, '#ffff00', true);
                gameState.aiCars.forEach((car, i) => {
                    const colors = ['#ff0000', '#0000ff', '#00ff00', '#ff6600', '#ff00ff'];
                    drawCar(ctx, car, colors[i]);
                });
                drawHUD(ctx, gameState, gameState.player);

                // Status
                document.getElementById('gameStatus').innerText =
                    `Pos: ${gameState.leaderboard[0].position} | Lap: ${gameState.player.lap}/${RACE.totalLaps}`;

            } else if (gameState.gamePhase === "results") {
                drawTrack(ctx, TRACK.waypoints);
                drawRaceResults(ctx, gameState.leaderboard);

                if (keys['r']) {
                    keys['r'] = false;
                    initGame();
                }
            }

            requestAnimationFrame(gameLoop);
        }

        // SECTION 11: INITIALIZATION
        function initGame() {
            gameState.player = {
                id: 0,
                x: TRACK.startX,
                y: TRACK.startY,
                vx: 0,
                vy: 0,
                angle: 0,
                speed: 0,
                lap: 0,
                lastLapTime: 0,
                lastX: TRACK.startX,
                lastY: TRACK.startY,
                tireWear: 1.0,
                isPitting: false,
                pitTimeRemaining: 0,
                steeringAngle: 0,
                drsActive: false,
                drsTimer: 0
            };

            gameState.aiCars = [];
            const offsets = [60, -60, 120, -120, 0];
            for (let i = 0; i < AI_CAR.count; i++) {
                gameState.aiCars.push({
                    id: i + 1,
                    x: TRACK.startX + offsets[i],
                    y: TRACK.startY + 50,
                    vx: 0,
                    vy: 0,
                    angle: 0,
                    speed: 0,
                    lap: 0,
                    lastLapTime: 0,
                    lastX: TRACK.startX + offsets[i],
                    lastY: TRACK.startY + 50,
                    tireWear: 1.0,
                    isPitting: false,
                    pitTimeRemaining: 0,
                    steeringAngle: 0
                });
            }

            gameState.gamePhase = "start";
            gameState.raceStartCountdown = RACE.startCountdown;
            gameState.leaderboard = [gameState.player, ...gameState.aiCars];
            gameState.waypointIndex = {};
        }

        const canvas = document.getElementById('gameCanvas');
        initGame();
        gameLoop();
    </script>
</body>
</html>
